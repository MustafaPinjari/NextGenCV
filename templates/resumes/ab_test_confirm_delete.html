{% extends "base.html" %}
{% block title %}Delete A/B Test — NextGenCV{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:480px;">
  <div class="card bg-dark border-danger">
    <div class="card-body p-4 text-center">
      <i class="bi bi-trash display-4 text-danger mb-3 d-block"></i>
      <h4 class="fw-bold">Delete A/B Test?</h4>
      <p class="text-muted">This will permanently delete <strong>{{ test.name }}</strong> and all its tracking data.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'ab_test_detail' test.pk %}" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
