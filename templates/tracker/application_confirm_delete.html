{% extends 'layouts/authenticated.html' %}
{% block title %}Delete Application — NextGenCV{% endblock %}
{% block content %}
<div style="padding:32px;max-width:500px;margin:0 auto">
  <div style="background:#0d1117;border:1px solid #21262d;border-radius:16px;padding:28px;text-align:center">
    <div style="font-size:2rem;color:#f87171;margin-bottom:12px"><i class="bi bi-trash"></i></div>
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px;color:#f0f6fc">Delete Application?</div>
    <div style="font-size:.85rem;color:#8b949e;margin-bottom:24px">
      This will permanently delete your application to <strong style="color:#f0f6fc">{{ application.company }}</strong> for <strong style="color:#f0f6fc">{{ application.role }}</strong>.
    </div>
    <form method="post" style="display:flex;gap:10px;justify-content:center">
      {% csrf_token %}
      <button type="submit" style="padding:10px 20px;background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3);border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit">Delete</button>
      <a href="{% url 'application_detail' application.pk %}" style="padding:10px 20px;background:#161b22;color:#8b949e;border:1px solid #30363d;border-radius:8px;font-weight:600;text-decoration:none">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
