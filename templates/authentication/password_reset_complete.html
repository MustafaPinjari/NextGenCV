{% extends 'layouts/public.html' %}
{% block title %}Password Reset Complete — NextGenCV{% endblock %}
{% block content %}
<div style="max-width:480px;margin:80px auto;padding:0 20px;text-align:center">
  <div style="font-size:3rem;margin-bottom:16px">✅</div>
  <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:10px">Password updated!</h1>
