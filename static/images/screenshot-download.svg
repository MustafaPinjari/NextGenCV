<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window Frame -->
  <rect width="600" height="400" rx="8" fill="#1e293b"/>
  <rect y="0" width="600" height="40" rx="8" fill="#0f172a"/>
  
  <!-- Browser Dots -->
  <circle cx="20" cy="20" r="6" fill="#ef4444"/>
  <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="20" r="6" fill="#10b981"/>
  
  <!-- URL Bar -->
  <rect x="100" y="12" width="400" height="16" rx="8" fill="#334155"/>
  <text x="110" y="24" font-family="monospace" font-size="12" fill="#94a3b8">nextgencv.com/resumes/1</text>
  
  <!-- Content Area -->
  <g transform="translate(50, 70)">
    <!-- Success Badge -->
    <g transform="translate(200, 0)">
      <circle cx="50" cy="30" r="30" fill="#10b981" fill-opacity="0.2"/>
      <path d="M 40 30 L 47 37 L 60 24" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    
    <!-- Heading -->
    <text x="250" y="90" font-family="sans-serif" font-size="24" font-weight="bold" fill="#f1f5f9" text-anchor="middle">Resume Complete!</text>
    <text x="250" y="115" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Your professional resume is ready to download</text>
    
    <!-- Resume Preview Card -->
    <g transform="translate(125, 140)">
      <rect width="250" height="120" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
      
      <!-- Mini Resume Preview -->
      <rect x="20" y="20" width="80" height="80" rx="4" fill="#ffffff"/>
      <rect x="25" y="25" width="70" height="8" rx="2" fill="#3b82f6"/>
      <rect x="25" y="38" width="50" height="4" rx="2" fill="#e2e8f0"/>
      <rect x="25" y="46" width="60" height="4" rx="2" fill="#e2e8f0"/>
      <rect x="25" y="54" width="55" height="4" rx="2" fill="#e2e8f0"/>
      <rect x="25" y="65" width="70" height="3" rx="1" fill="#f1f5f9"/>
      <rect x="25" y="71" width="65" height="3" rx="1" fill="#f1f5f9"/>
      <rect x="25" y="77" width="60" height="3" rx="1" fill="#f1f5f9"/>
      
      <!-- Info -->
      <text x="115" y="35" font-family="sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">My Resume.pdf</text>
      <text x="115" y="55" font-family="sans-serif" font-size="12" fill="#94a3b8">Professional Template</text>
      <text x="115" y="75" font-family="sans-serif" font-size="12" fill="#10b981">✓ ATS Optimized</text>
    </g>
    
    <!-- Download Buttons -->
    <g transform="translate(100, 280)">
      <rect x="0" y="0" width="140" height="40" rx="6" fill="#3b82f6"/>
      <text x="70" y="26" font-family="sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Download PDF</text>
      
      <rect x="160" y="0" width="140" height="40" rx="6" fill="transparent" stroke="#475569" stroke-width="2"/>
      <text x="230" y="26" font-family="sans-serif" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="middle">Download DOCX</text>
    </g>
  </g>
</svg>
