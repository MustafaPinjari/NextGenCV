<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Base gradient -->
  <rect width="1920" height="1080" fill="url(#heroGradient)"/>
  
  <!-- Glowing orbs -->
  <circle cx="300" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="1600" cy="800" r="500" fill="url(#glow2)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1920" y2="1080" stroke="#3b82f6" stroke-width="1"/>
    <line x1="1920" y1="0" x2="0" y2="1080" stroke="#6366f1" stroke-width="1"/>
    <circle cx="960" cy="540" r="300" stroke="#3b82f6" stroke-width="2" fill="none"/>
    <circle cx="960" cy="540" r="450" stroke="#6366f1" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Abstract shapes -->
  <g opacity="0.1">
    <rect x="100" y="100" width="200" height="200" rx="20" fill="#3b82f6"/>
    <rect x="1600" y="700" width="150" height="150" rx="15" fill="#6366f1"/>
    <circle cx="1700" cy="200" r="80" fill="#3b82f6"/>
    <circle cx="200" cy="900" r="60" fill="#6366f1"/>
  </g>
</svg>
