<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window Frame -->
  <rect width="600" height="400" rx="8" fill="#1e293b"/>
  <rect y="0" width="600" height="40" rx="8" fill="#0f172a"/>
  
  <!-- Browser Dots -->
  <circle cx="20" cy="20" r="6" fill="#ef4444"/>
  <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="20" r="6" fill="#10b981"/>
  
  <!-- URL Bar -->
  <rect x="100" y="12" width="400" height="16" rx="8" fill="#334155"/>
  <text x="110" y="24" font-family="monospace" font-size="12" fill="#94a3b8">nextgencv.com/resumes/create</text>
  
  <!-- Split Layout -->
  <!-- Left Panel - Form -->
  <g transform="translate(30, 60)">
    <text x="0" y="20" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">Resume Builder</text>
    
    <!-- Progress Steps -->
    <g transform="translate(0, 40)">
      <circle cx="10" cy="10" r="8" fill="#3b82f6"/>
      <text x="25" y="15" font-family="sans-serif" font-size="12" fill="#f1f5f9">Personal Info</text>
      
      <line x1="10" y1="20" x2="10" y2="35" stroke="#475569" stroke-width="2"/>
      
      <circle cx="10" cy="45" r="8" fill="#334155" stroke="#475569" stroke-width="2"/>
      <text x="25" y="50" font-family="sans-serif" font-size="12" fill="#94a3b8">Experience</text>
      
      <line x1="10" y1="55" x2="10" y2="70" stroke="#475569" stroke-width="2"/>
      
      <circle cx="10" cy="80" r="8" fill="#334155" stroke="#475569" stroke-width="2"/>
      <text x="25" y="85" font-family="sans-serif" font-size="12" fill="#94a3b8">Education</text>
    </g>
    
    <!-- Form Fields -->
    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="220" height="35" rx="4" fill="#334155"/>
      <text x="10" y="22" font-family="sans-serif" font-size="12" fill="#94a3b8">John Doe</text>
      
      <rect x="0" y="45" width="220" height="35" rx="4" fill="#334155"/>
      <text x="10" y="67" font-family="sans-serif" font-size="12" fill="#94a3b8">john@example.com</text>
      
      <rect x="0" y="90" width="220" height="35" rx="4" fill="#334155"/>
      <text x="10" y="112" font-family="sans-serif" font-size="12" fill="#94a3b8">+1 (555) 123-4567</text>
    </g>
  </g>
  
  <!-- Right Panel - Preview -->
  <g transform="translate(320, 60)">
    <text x="0" y="20" font-family="sans-serif" font-size="14" font-weight="600" fill="#94a3b8">Live Preview</text>
    
    <!-- Resume Preview -->
    <rect x="0" y="35" width="240" height="280" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Resume Header -->
    <text x="120" y="65" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">JOHN DOE</text>
    <text x="120" y="85" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Software Engineer</text>
    
    <!-- Resume Lines -->
    <line x1="20" y1="105" x2="220" y2="105" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="20" y="115" width="60" height="8" rx="2" fill="#e2e8f0"/>
    <rect x="20" y="130" width="200" height="4" rx="2" fill="#f1f5f9"/>
    <rect x="20" y="140" width="180" height="4" rx="2" fill="#f1f5f9"/>
    <rect x="20" y="150" width="190" height="4" rx="2" fill="#f1f5f9"/>
    
    <rect x="20" y="170" width="60" height="8" rx="2" fill="#e2e8f0"/>
    <rect x="20" y="185" width="200" height="4" rx="2" fill="#f1f5f9"/>
    <rect x="20" y="195" width="180" height="4" rx="2" fill="#f1f5f9"/>
  </g>
</svg>
